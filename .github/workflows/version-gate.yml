# Version gate ŌĆö runs on every PR to main.
#
# Enforces the scoped per-PR versioning policy (docs/versioning.md): a PR
# whose diff touches runtime paths (agents/, skills/, hooks/, .claude-plugin/
# ŌĆö the runtime half of the runtime-vs-development split in AGENTS.md) must
# bump the plugin version in .claude-plugin/plugin.json (the canonical slot);
# exempt PRs pass without a bump. Any changed version ŌĆö required or voluntary
# ŌĆö must be a valid SemVer increment, all four version strings must agree, the
# CHANGELOG must carry a section for the new version, and no OLDER open PR may
# already claim it. The in-tree half of the contract (string agreement,
# changelog shape) is authoritatively tested by
# tests/version-consistency.test.ts under harness-checks.yml; the checks here
# need git/API context that a bun test cannot have.
#
# KNOWN RACE, accepted: this gate re-runs on `synchronize` (your pushes), not
# when ANOTHER PR merges. Mitigation: branch protection marks this check
# required with "Require branches to be up to date before merging" ŌĆö the
# forced rebase triggers a re-run against the new base. Backstop:
# release-on-merge.yml fails loudly on a duplicate tag.
#
# SECURITY: plain `pull_request` trigger (read-only default token). PR head
# files are read as data (jq/grep), never executed. No `${{ }}` expression of
# PR-controlled content is ever inlined in a `run:` script ŌĆö only via `env:`.
name: Version gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: version-gate-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  version-gate:
    name: Check version is bumped and free
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Read PR and base versions
        id: versions
        run: |
          set -euo pipefail
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
          PR_V=$(jq -r .version .claude-plugin/plugin.json)
          grep -qE "$SEMVER_RE" <<<"$PR_V" \
            || { echo "::error::PR version is not 3-part semver: '$PR_V'"; exit 1; }
          git fetch origin "$BASE_REF" --depth=1 --quiet
          BASE_V=$(git show FETCH_HEAD:.claude-plugin/plugin.json | jq -r .version)
          grep -qE "$SEMVER_RE" <<<"$BASE_V" \
            || { echo "::error::base version is not 3-part semver: '$BASE_V'"; exit 1; }
          echo "pr=$PR_V" >> "$GITHUB_OUTPUT"
          echo "base=$BASE_V" >> "$GITHUB_OUTPUT"
          echo "PR version: $PR_V (base: $BASE_V)"

      - name: Classify PR scope
        id: scope
        # Decides which policy branch applies (docs/versioning.md): a bump is
        # required iff the diff touches runtime paths ŌĆö the runtime half of
        # the runtime-vs-development split in AGENTS.md; adding a new runtime
        # directory there means adding it to the grep below. Two-endpoint
        # tree diff: HEAD is the PR merge ref, whose tree already contains
        # the event-time base, so diffing the base tip (FETCH_HEAD, fetched
        # by the previous step) against HEAD yields exactly the PR's changes.
        # If base moved after the event, extra files appear ŌĆö classification
        # only gets STRICTER, never silently exempt (same staleness race as
        # the header's). quotePath off so non-ASCII paths are not quoted (a
        # leading '"' would defeat the anchor); --no-renames so both sides of
        # a rename are listed (rename detection would hide the runtime side).
        # Filenames are matched and logged as data, never executed; only
        # true/false booleans cross the step boundary.
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
          BASE_V: ${{ steps.versions.outputs.base }}
        run: |
          set -euo pipefail
          CHANGED=$(git -c core.quotePath=false diff --name-only --no-renames FETCH_HEAD HEAD)
          echo "Files changed vs base:"
          sed 's/^/  /' <<<"$CHANGED"
          RUNTIME=$(grep -E '^(agents|skills|hooks|\.claude-plugin)/' <<<"$CHANGED" || true)
          if [ -n "$RUNTIME" ]; then RUNTIME_TOUCHED=true; else RUNTIME_TOUCHED=false; fi
          if [ "$PR_V" = "$BASE_V" ]; then VERSION_CHANGED=false; else VERSION_CHANGED=true; fi
          echo "runtime_touched=$RUNTIME_TOUCHED" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED runtime_touched=$RUNTIME_TOUCHED"

      - name: Runtime paths changed ŌĆö version bump required
        if: steps.scope.outputs.runtime_touched == 'true' && steps.scope.outputs.version_changed == 'false'
        run: |
          echo "::error::This PR changes runtime paths (agents/, skills/, hooks/, .claude-plugin/) but does not bump the plugin version. Run .claude/scripts/next-version.sh <major|minor|patch>, update all four version strings, add a '## [X.Y.Z]' CHANGELOG section, and title the PR 'vX.Y.Z <type>: <subject>' (docs/versioning.md). The changed files are listed in the 'Classify PR scope' step above."
          exit 1

      - name: Exempt ŌĆö no runtime changes, no bump required
        if: steps.scope.outputs.runtime_touched == 'false' && steps.scope.outputs.version_changed == 'false'
        run: |
          echo "::notice::Version gate passed without a bump: no runtime paths (agents/, skills/, hooks/, .claude-plugin/) changed and the version is unchanged. Exempt PRs need no changelog section or title prefix (docs/versioning.md)."

      - name: Version is bumped vs base
        if: steps.scope.outputs.version_changed == 'true'
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
          BASE_V: ${{ steps.versions.outputs.base }}
        run: |
          set -euo pipefail
          IFS=. read -r pM pm pp <<<"$PR_V"
          IFS=. read -r bM bm bp <<<"$BASE_V"
          if [ "$pM" -gt "$bM" ] \
            || { [ "$pM" -eq "$bM" ] && [ "$pm" -gt "$bm" ]; } \
            || { [ "$pM" -eq "$bM" ] && [ "$pm" -eq "$bm" ] && [ "$pp" -gt "$bp" ]; }; then
            echo "OK: $BASE_V -> $PR_V"
          else
            echo "::error::PR version $PR_V is not an increment over base $BASE_V (docs/versioning.md). If main bumped past your branch, rebase on main and re-run .claude/scripts/next-version.sh <major|minor|patch>"
            exit 1
          fi

      - name: Increment shape is valid
        if: steps.scope.outputs.version_changed == 'true'
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
          BASE_V: ${{ steps.versions.outputs.base }}
        run: |
          set -euo pipefail
          IFS=. read -r pM pm pp <<<"$PR_V"
          IFS=. read -r bM bm bp <<<"$BASE_V"
          if [ "$pM" -gt "$bM" ]; then
            [ "$pm" -eq 0 ] && [ "$pp" -eq 0 ] \
              || { echo "::error::major bump must be X.0.0 (got $PR_V)"; exit 1; }
            [ "$pM" -gt "$((bM + 1))" ] && echo "::warning::major jumped $BASE_V -> $PR_V (gap; fine if queued PRs claim the slots between)"
          elif [ "$pm" -gt "$bm" ]; then
            [ "$pp" -eq 0 ] \
              || { echo "::error::minor bump must be x.Y.0 (got $PR_V from $BASE_V)"; exit 1; }
            [ "$pm" -gt "$((bm + 1))" ] && echo "::warning::minor jumped $BASE_V -> $PR_V (gap; fine if queued PRs claim the slots between)"
          else
            [ "$pp" -gt "$((bp + 1))" ] && echo "::warning::patch jumped $BASE_V -> $PR_V (gap; fine if queued PRs claim the slots between)"
          fi
          echo "OK: increment shape valid"

      - name: Four version strings agree
        # Cheap restatement so the failure is visible in this gate; the
        # authoritative copy is tests/version-consistency.test.ts.
        if: steps.scope.outputs.version_changed == 'true'
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
        run: |
          set -euo pipefail
          MKT_META=$(jq -r .metadata.version .claude-plugin/marketplace.json)
          MKT_PLUGIN=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          PKG=$(jq -r .version package.json)
          for v in "$MKT_META" "$MKT_PLUGIN" "$PKG"; do
            [ "$v" = "$PR_V" ] || { echo "::error::version strings disagree: plugin.json=$PR_V marketplace.metadata=$MKT_META marketplace.plugins[0]=$MKT_PLUGIN package.json=$PKG"; exit 1; }
          done
          echo "OK: all four version strings read $PR_V"

      - name: Changelog section present
        if: steps.scope.outputs.version_changed == 'true'
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
        run: |
          set -euo pipefail
          ESC=$(sed 's/\./\\./g' <<<"$PR_V")
          grep -qE "^## \[$ESC\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md \
            || { echo "::error::CHANGELOG.md has no '## [$PR_V] - YYYY-MM-DD' section ŌĆö each version-bumping PR rolls its own (docs/versioning.md)"; exit 1; }
          echo "OK: CHANGELOG.md has a section for $PR_V"

      - name: No older open PR claims this version
        # Fail-open: an API error must not block merges on a network blip.
        if: steps.scope.outputs.version_changed == 'true'
        env:
          PR_V: ${{ steps.versions.outputs.pr }}
        run: |
          set -uo pipefail
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
          prs=$(gh api "repos/$REPO/pulls?state=open&per_page=100" \
            --jq '.[] | "\(.number) \(.head.repo.full_name) \(.head.sha)"' 2>/dev/null) \
            || { echo "::warning::could not list open PRs ŌĆö collision check skipped"; exit 0; }
          while read -r num head_repo head_sha; do
            [ -n "${num:-}" ] || continue
            [ "$num" = "$PR_NUMBER" ] && continue
            v=$(gh api -H "Accept: application/vnd.github.raw+json" \
              "repos/$head_repo/contents/.claude-plugin/plugin.json?ref=$head_sha" 2>/dev/null \
              | jq -r .version 2>/dev/null)
            grep -qE "$SEMVER_RE" <<<"${v:-}" || continue
            if [ "$v" = "$PR_V" ]; then
              if [ "$num" -lt "$PR_NUMBER" ]; then
                echo "::error::v$PR_V is already claimed by older PR #$num ŌĆö the older PR keeps the slot. Rebase on main and re-run .claude/scripts/next-version.sh"
                exit 1
              fi
              echo "::notice::newer PR #$num also claims v$PR_V ŌĆö that PR is the one that must move"
            fi
          done <<<"$prs"
          echo "OK: no older open PR claims $PR_V"
