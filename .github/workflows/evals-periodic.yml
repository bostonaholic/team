# Evals (periodic) — weekly cost-bearing E2E + LLM-judge tier.
#
# Invokes `claude -p` against fixtures under evals/fixtures/<agent>/<case>/,
# then runs the LLM-judge over agent output. Requires ANTHROPIC_API_KEY
# (stored as a repo secret) and runs only on the weekly cron or via manual
# workflow_dispatch.
#
# Runs Monday 06:00 UTC. Gate tier (offline) lives in evals.yml.
name: Evals (periodic)

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: evals-periodic
  cancel-in-progress: true

jobs:
  evals-periodic:
    name: Evals — periodic
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite:
          - { name: code-reviewer, file: test/code-reviewer.evals.ts }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.suite.name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVALS: "1"
          EVALS_ALL: "1"
          EVALS_TIER: periodic
        run: bun test ${{ matrix.suite.file }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-periodic-${{ matrix.suite.name }}-${{ github.run_id }}
          path: evals/results/
          retention-days: 90
