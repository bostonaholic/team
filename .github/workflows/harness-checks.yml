# Harness checks — runs on every PR to main.
#
# Validates the eval harness itself: unit tests for the TS helpers
# (parsers, storage, selection, judging) plus schema validation of every
# fixture and rubric on disk. No model calls, no EVALS_ANTHROPIC_API_KEY,
# completes in well under 5 seconds.
#
# Live agent runs against the model live in behavioral-evals.yml.
name: Harness checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Use the PR number (or run id outside a PR), never the attacker-controlled
  # branch name (github.head_ref) in the group key.
  group: harness-checks-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  harness-checks:
    name: Validate harness + fixtures
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 — diff-based test selection compares against origin/main.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run harness checks
        # Paid agent-behavior files are named *.evals.ts — outside Bun's
        # auto-discovery pattern (*.test.{ts,js,...}) — so `bun test`
        # with no args never loads them.
        run: bun test

      - name: Run gate-tier evals (mocked, free)
        # Replays each gate-tier eval case against its recorded mock seams
        # (EVALS_MOCK_AGENT / EVALS_MOCK_JUDGE) one case per invocation. No
        # API key, no `claude -p` spawn — deterministic and free on every PR.
        run: node scripts/run-gate-evals.mjs
