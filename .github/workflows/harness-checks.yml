# Harness checks — runs on every PR to main.
#
# Validates the eval harness itself: unit tests for the TS helpers
# (parsers, storage, selection, judging) plus schema validation of every
# fixture and rubric on disk. No model calls, no EVALS_ANTHROPIC_API_KEY,
# completes in well under 5 seconds.
#
# Live agent runs against the model live in behavioral-evals.yml.
name: Harness checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Key on the PR number (never the attacker-controlled branch name) so a
  # crafted head_ref can't collide with or cancel another PR's group.
  group: harness-checks-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  harness-checks:
    name: Validate harness + fixtures
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Author gate contract (issue #51): the steps below are free (no secret,
    # no `claude` spawn), so the job itself stays UNGATED — fork authors keep
    # free CI. But any step that consumes a secret or spawns `claude` MUST
    # carry this trust `if:`:
    #   contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    # When PR #32's "Run gate-tier evals" step attaches paid execution here,
    # it inherits this gate so untrusted PR authors never spend tokens.
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 — diff-based test selection compares against origin/main.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run harness checks
        # Paid agent-behavior files are named *.evals.ts — outside Bun's
        # auto-discovery pattern (*.test.{ts,js,...}) — so `bun test`
        # with no args never loads them.
        run: bun test
