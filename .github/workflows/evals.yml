# Evals (gate) — runs on every PR to main.
#
# Free tier: static unit tests + fixture/rubric validation. No model calls,
# no ANTHROPIC_API_KEY required. Completes in well under 5 seconds.
#
# Cost-bearing E2E + LLM-judge tiers live in evals-periodic.yml.
name: Evals (gate)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: evals-gate-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  evals-gate:
    name: Evals — static gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 — diff-based test selection compares against origin/main.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Static gate (free, no secrets)
        # Paid E2E + judge files are named *.evals.ts — outside Bun's
        # auto-discovery pattern (*.test.{ts,js,...}) — so `bun test`
        # with no args never loads them.
        run: bun test
