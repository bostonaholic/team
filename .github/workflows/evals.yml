# Evals (gate) — runs on every PR to main.
#
# Offline tier: structural assertions only. No model calls, no secrets,
# no ANTHROPIC_API_KEY required. The gate script (evals/gate/run.sh)
# completes in under 5 seconds locally; this workflow also runs the 18
# evals acceptance-test scripts so a broken harness fails the PR.
#
# Periodic / cost-bearing E2E tier lives in evals-periodic.yml.
name: Evals (gate)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: evals-gate-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Opt JavaScript actions onto Node 24 ahead of the June 2026 default flip.
# Affects actions/checkout@v4 and actions/setup-node@v4 — both ship Node 20
# today, which the runner deprecation warning flags. Switch is forward-only;
# Node 20 stops being installed in Sept 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 — the diff-based fixture selector
          # (evals/lib/select.mjs) compares against origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run gate (structural assertions, no model calls)
        run: bash evals/gate/run.sh

      - name: Run evals acceptance tests
        # Only the 18 evals-*-tests.sh files. Two pre-existing failing
        # suites (engineering-standards-methodology-tests.sh and
        # skill-architecture-tests.sh) are docs-alignment issues
        # unrelated to evals and are intentionally not run here.
        run: |
          failures=0
          for f in tests/evals-*-tests.sh; do
            echo "=== $f ==="
            if ! bash "$f"; then failures=$((failures + 1)); fi
          done
          exit $failures

# TODO(follow-up): add a `report` job that downloads eval artifacts and
# summarizes PASS/FAIL + cost into a single PR comment, upserting on rerun.
# Deferred from slice 1 to keep the gate tier dependency-free.
