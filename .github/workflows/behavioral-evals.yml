# Behavioral evals — weekly live-agent regression check.
#
# This is the actual eval tier: spawns `claude -p` against fixtures under
# evals/fixtures/<agent>/<case>/, then runs the LLM-judge over the agent's
# output. Detects behavior regression when the underlying model changes.
# Requires an Anthropic API key (stored as the EVALS_ANTHROPIC_API_KEY repo
# secret, exposed to the harness under the same name) and runs only on
# the weekly cron or via manual workflow_dispatch.
#
# Runs Monday 06:00 UTC. Offline harness checks live in harness-checks.yml.
name: Behavioral evals

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: behavioral-evals
  cancel-in-progress: true

jobs:
  behavioral-evals:
    name: Live agent runs (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite:
          # File path MUST be `./`-prefixed: bun treats a bare `tests/...`
          # arg as a name filter (matches nothing), not a path.
          - { name: code-reviewer, file: ./tests/code-reviewer.evals.ts }
          - { name: changelog, file: ./tests/changelog.evals.ts }
          - { name: eng-design-doc-review, file: ./tests/eng-design-doc-review.evals.ts }
          - { name: git-commit, file: ./tests/git-commit.evals.ts }
          - { name: team-design, file: ./tests/team-design.evals.ts }
          - { name: team-fix, file: ./tests/team-fix.evals.ts }
          - { name: team-plan, file: ./tests/team-plan.evals.ts }
          - { name: team-question, file: ./tests/team-question.evals.ts }
          - { name: team-research, file: ./tests/team-research.evals.ts }
          - { name: team-structure, file: ./tests/team-structure.evals.ts }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The live suite spawns the `claude` CLI (tests/helpers/session-runner.ts).
      # It is not a project dependency, so install it globally onto $PATH here.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run ${{ matrix.suite.name }} agent live
        env:
          # The judge reads EVALS_ANTHROPIC_API_KEY (namespaced so the spawned
          # agent won't auto-pick it up in local dev). In CI there is no
          # logged-in session, so the agent under test gets its own credential
          # via the bare ANTHROPIC_API_KEY, sourced from the same secret.
          EVALS_ANTHROPIC_API_KEY: ${{ secrets.EVALS_ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.EVALS_ANTHROPIC_API_KEY }}
          EVALS: "1"
          EVALS_ALL: "1"
          EVALS_TIER: periodic
          # Route matrix values through env (not direct ${{ }} expansion into
          # the run: shell). Matrix values are author-controlled here, but
          # the env-wrapping pattern stays correct as the matrix grows.
          SUITE_FILE: ${{ matrix.suite.file }}
        run: bun test "$SUITE_FILE"

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: behavioral-evals-${{ matrix.suite.name }}-${{ github.run_id }}
          path: evals/results/
          retention-days: 90
