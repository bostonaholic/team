# Behavioral evals — weekly live-agent regression check.
#
# This is the actual eval tier: spawns `claude -p` against fixtures under
# evals/fixtures/<agent>/<case>/, then runs the LLM-judge over the agent's
# output. Detects behavior regression when the underlying model changes.
# Requires ANTHROPIC_API_KEY (stored as a repo secret) and runs only on
# the weekly cron or via manual workflow_dispatch.
#
# Runs Monday 06:00 UTC. Offline harness checks live in harness-checks.yml.
name: Behavioral evals

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: behavioral-evals
  cancel-in-progress: true

jobs:
  behavioral-evals:
    name: Live agent runs (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite:
          # File path MUST be `./`-prefixed: bun treats a bare `test/...`
          # arg as a name filter (matches nothing), not a path.
          - { name: code-reviewer, file: ./test/code-reviewer.evals.ts }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.suite.name }} agent live
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVALS: "1"
          EVALS_ALL: "1"
          EVALS_TIER: periodic
          # Route matrix values through env (not direct ${{ }} expansion into
          # the run: shell). Matrix values are author-controlled here, but
          # the env-wrapping pattern stays correct as the matrix grows.
          SUITE_FILE: ${{ matrix.suite.file }}
        run: bun test "$SUITE_FILE"

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: behavioral-evals-${{ matrix.suite.name }}-${{ github.run_id }}
          path: evals/results/
          retention-days: 90
