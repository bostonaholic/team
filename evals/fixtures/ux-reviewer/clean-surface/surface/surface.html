<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product</title>
  </head>
  <body>
    <header>
      <h1>Acme Widgets</h1>
    </header>
    <main>
      <!-- Accessible: hero image carries descriptive alt text. -->
      <img src="hero.png" width="640" height="320"
           alt="A blue Acme widget on a workbench" />

      <section>
        <h2>Find a widget</h2>
        <!-- Accessible: search input has an associated label. -->
        <label for="q">Search widgets</label>
        <input type="text" id="q" name="q" placeholder="Search" />
        <button type="submit">Go</button>
      </section>
    </main>
  </body>
</html>
