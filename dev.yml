name: team

up:
  - claude-code
  - custom:
      name: beads
      met?: "which bd"
      meet: "brew install beads"
  - custom:
      name: playwright-cli
      met?: "npx --no-install playwright-cli --version 2>/dev/null"
      meet: "npm install -g @playwright/cli@latest && playwright-cli install --skills"

check:
  plugin: "claude plugin validate ."

test:
  run: "script/test"
  desc: "Run all acceptance test scripts under tests/"

commands:
  install:
    desc: "Register plugin as a local marketplace for global access"
    run: "script/dev-install"
  uninstall:
    desc: "Unregister plugin and clean up cache"
    run: "script/dev-uninstall"
  update:
    desc: "Update all agent skills"
    # TODO: `npx skills update` ignores project-level skills-lock.json
    #   https://github.com/vercel-labs/skills/issues/775
    #   https://github.com/vercel-labs/skills/issues/690
    #   Workaround: reinstall from source until fix is merged.
    run: "npx skills add steveyegge/beads --skill beads --agent claude-code pi -y"
  docs:
    desc: "Build and serve the docs site locally at http://localhost:4000"
    run: "cd docs && bundle config set --local path 'vendor/bundle' && bundle install && bundle exec jekyll serve --livereload"
  evals:
    desc: "Run the free static gate (fixture/contract/integrity checks + harness unit tests, no API key)"
    run: "bun test"
  evals:gate:
    desc: "Run the gate-tier agent evals mocked & offline (free, deterministic, no API key)"
    run: "bun scripts/run-gate-evals.ts"
  evals:periodic:
    desc: "Run the paid E2E + judge tier (requires EVALS_ANTHROPIC_API_KEY; spends real money)"
    run: "bun run test:periodic"

open:
  docs: "http://localhost:4000"
  site: "https://team.bostonaholic.dev"
