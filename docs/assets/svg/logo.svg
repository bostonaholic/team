<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-label="TEAM logo">
  <!-- Agent mesh: 5 nodes connected in a directed mesh pattern -->
  <!-- Outer nodes -->
  <circle cx="20" cy="6"  r="3.5" fill="#00D4FF" opacity="0.9"/>
  <circle cx="34" cy="16" r="3.5" fill="#00D4FF" opacity="0.7"/>
  <circle cx="34" cy="30" r="3.5" fill="#FFB800" opacity="0.8"/>
  <circle cx="6"  cy="30" r="3.5" fill="#00D4FF" opacity="0.7"/>
  <circle cx="6"  cy="16" r="3.5" fill="#FFB800" opacity="0.8"/>
  <!-- Center node -->
  <circle cx="20" cy="22" r="4.5" fill="#00D4FF"/>
  <!-- Edges from center -->
  <line x1="20" y1="9.5"  x2="20" y2="17.5" stroke="#00D4FF" stroke-width="1.2" opacity="0.5"/>
  <line x1="23.2" y1="20.2" x2="30.8" y2="17" stroke="#00D4FF" stroke-width="1.2" opacity="0.4"/>
  <line x1="23.2" y1="24.2" x2="30.8" y2="28" stroke="#FFB800" stroke-width="1.2" opacity="0.4"/>
  <line x1="16.8" y1="24.2" x2="9.2"  y2="28" stroke="#00D4FF" stroke-width="1.2" opacity="0.4"/>
  <line x1="16.8" y1="20.2" x2="9.2"  y2="17" stroke="#FFB800" stroke-width="1.2" opacity="0.4"/>
  <!-- Outer ring edges (clockwise) -->
  <line x1="23.3" y1="7.5"  x2="30.8" y2="13.5" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="34"   y1="19.5" x2="34"   y2="26.5" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="31"   y1="31.5" x2="9"    y2="31.5" stroke="#FFB800" stroke-width="0.8" opacity="0.2"/>
  <line x1="6"    y1="26.5" x2="6"    y2="19.5" stroke="#00D4FF" stroke-width="0.8" opacity="0.2"/>
  <line x1="9.2"  y1="14.5" x2="16.7" y2="7.5"  stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>
</svg>
