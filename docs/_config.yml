title: Team
description: Autonomous feature delivery for Claude Code
url: "https://team.bostonaholic.dev"
baseurl: ""

# No theme: key — fully custom theme via _layouts/, _includes/, _sass/, assets/

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false

# what NOT to publish
exclude:
  - plans
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - .jekyll-metadata
