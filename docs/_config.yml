title: Team
description: Autonomous feature delivery for Claude Code
url: "https://team.bostonaholic.dev"
baseurl: ""
author: Matthew Boston

theme: minima

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

# what NOT to publish
exclude:
  - plans
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - .jekyll-metadata
